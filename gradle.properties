# AndroidClaw - gradle.properties
# 项目全局配置

# Android 配置
android.useAndroidX=true
android.nonTransitiveRClass=true
android.enableJetifier=true

# Kotlin 配置
kotlin.code.style=official
kotlin.incremental=true

# Compose 配置
compose.version=1.6.0
compose.compiler.reports=true
compose.compiler.stabilityConfigurationFile=stability_config.conf

# 推理引擎版本
mediapipe.version=0.10.14
mlc-llm.version=0.1.0
litert.version=1.0.0

# 构建配置
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# 模型下载配置
model.download.base.url=https://huggingface.co
model.download.mirror.url=https://hf-mirror.com
model.download.timeout.ms=300000

# 网络容错配置
systemProp.org.gradle.internal.http.connectionTimeout=60000
systemProp.org.gradle.internal.http.socketTimeout=60000
systemProp.org.gradle.internal.repository.max.retries=3
systemProp.org.gradle.internal.repository.initial.backoff=500
org.gradle.daemon=true
